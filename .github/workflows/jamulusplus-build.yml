name: JamulusPlus Build

on:
  workflow_dispatch:
  push:
    branches:
      - JamulusPlus
      - jamulusplus
    tags:
      - 'V*'
      - 'v*'
    paths:
      - '.github/workflows/jamulusplus-build.yml'
      - '.gitmodules'
      - 'JamulusPlus/**'
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/jamulusplus-build.yml'
      - '.gitmodules'
      - 'JamulusPlus/**'

permissions:
  contents: write

jobs:
  build-windows:
    name: Windows CLAP + VST3 + Standalone
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Checkout JamulusPlus submodules
        run: |
          git submodule update --init --depth 1 --recursive -- JamulusPlus/third_party/JUCE JamulusPlus/third_party/clap-juce-extensions

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure
        run: >
          cmake -S JamulusPlus -B JamulusPlus/build-ci-windows -G "Visual Studio 17 2022" -A x64
          -DENABLE_CLAP=ON
          -DENABLE_STANDALONE=ON

      - name: Build CLAP
        run: >
          cmake --build JamulusPlus/build-ci-windows --config Release
          --target jamulus_engine_CLAP
          --verbose

      - name: Build VST3
        run: >
          cmake --build JamulusPlus/build-ci-windows --config Release
          --target jamulus_engine_VST3
          --verbose

      - name: Build Standalone
        run: >
          cmake --build JamulusPlus/build-ci-windows --config Release
          --target jamulus_engine_Standalone
          --verbose

      - name: Prepare Installer Inputs
        shell: pwsh
        run: |
          $installerRoot = "JamulusPlus/build-ci-windows/installer-input"
          $vst3Stage = Join-Path $installerRoot "JamulusPlus.vst3"
          $standaloneStage = Join-Path $installerRoot "JamulusPlus-Standalone"
          Remove-Item -Recurse -Force $installerRoot -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $vst3Stage | Out-Null
          New-Item -ItemType Directory -Force -Path $standaloneStage | Out-Null
          Copy-Item -Path "JamulusPlus/build-ci-windows/plugin/jamulus_engine_artefacts/Release/VST3/JamulusPlus.vst3/*" -Destination $vst3Stage -Recurse -Force
          $standaloneSource = if (Test-Path "JamulusPlus/dist/JamulusPlus-Standalone") { "JamulusPlus/dist/JamulusPlus-Standalone" } else { "JamulusPlus/build-ci-windows/plugin/jamulus_engine_artefacts/Release/Standalone" }
          Copy-Item -Path "$standaloneSource\\*" -Destination $standaloneStage -Recurse -Force

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build Inno Installer
        shell: pwsh
        run: |
          $tagName = "${{ github.ref_name }}"
          if ([string]::IsNullOrWhiteSpace($tagName)) { $tagName = "dev" }
          $numericParts = [regex]::Matches($tagName, '\d+') | ForEach-Object { $_.Value }
          if ($numericParts.Count -eq 0) { $numericParts = @("0") }
          while ($numericParts.Count -lt 4) { $numericParts += "0" }
          $versionInfo = ($numericParts | Select-Object -First 4) -join "."
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $iscc `
            "/DMyAppVersion=$versionInfo" `
            "/DMyAppDisplayVersion=$tagName" `
            "/DMyVersionInfoVersion=$versionInfo" `
            "/DMyOutputDir=JamulusPlus/build-ci-windows/installer-output" `
            "/DMyOutputBaseFilename=JamulusPlus-Setup-$tagName" `
            "/DMyVst3SourceDir=$(Resolve-Path 'JamulusPlus/build-ci-windows/installer-input/JamulusPlus.vst3')" `
            "/DMyStandaloneSourceDir=$(Resolve-Path 'JamulusPlus/build-ci-windows/installer-input/JamulusPlus-Standalone')" `
            "JamulusPlus/installer/jamulus_vst3.iss"
          if ($LASTEXITCODE -ne 0) { throw "Inno Setup compilation failed." }

      - name: Upload CLAP
        uses: actions/upload-artifact@v4
        with:
          name: JamulusPlus-windows-clap
          if-no-files-found: error
          path: JamulusPlus/build-ci-windows/plugin/jamulus_engine_artefacts/Release/CLAP/JamulusPlus.clap

      - name: Upload VST3
        uses: actions/upload-artifact@v4
        with:
          name: JamulusPlus-windows-vst3
          if-no-files-found: error
          path: JamulusPlus/build-ci-windows/plugin/jamulus_engine_artefacts/Release/VST3/JamulusPlus.vst3

      - name: Upload Standalone
        uses: actions/upload-artifact@v4
        with:
          name: JamulusPlus-windows-standalone
          if-no-files-found: error
          path: |
            JamulusPlus/build-ci-windows/plugin/jamulus_engine_artefacts/Release/Standalone/**
            JamulusPlus/dist/JamulusPlus-Standalone/**

      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: JamulusPlus-windows-installer
          if-no-files-found: error
          path: JamulusPlus/build-ci-windows/installer-output/*.exe

      - name: Package Release Assets
        if: startsWith(github.ref, 'refs/tags/V') || startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          Compress-Archive -Path "JamulusPlus/build-ci-windows/plugin/jamulus_engine_artefacts/Release/CLAP/JamulusPlus.clap" -DestinationPath "release-assets/JamulusPlus-${{ github.ref_name }}-windows-clap.zip" -Force
          Compress-Archive -Path "JamulusPlus/build-ci-windows/plugin/jamulus_engine_artefacts/Release/VST3/JamulusPlus.vst3" -DestinationPath "release-assets/JamulusPlus-${{ github.ref_name }}-windows-vst3.zip" -Force
          $standaloneSource = if (Test-Path "JamulusPlus/dist/JamulusPlus-Standalone") { "JamulusPlus/dist/JamulusPlus-Standalone" } else { "JamulusPlus/build-ci-windows/plugin/jamulus_engine_artefacts/Release/Standalone" }
          $standaloneStage = "release-assets/JamulusPlus-${{ github.ref_name }}-windows-standalone"
          Remove-Item -Recurse -Force $standaloneStage -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $standaloneStage | Out-Null
          if (Test-Path "JamulusPlus/dist/JamulusPlus-Standalone") {
            Copy-Item -Path "$standaloneSource\\*" -Destination $standaloneStage -Recurse -Force
          } else {
            Copy-Item -Path "$standaloneSource\\*" -Destination $standaloneStage -Recurse -Force
          }
          Compress-Archive -Path "$standaloneStage\\*" -DestinationPath "release-assets/JamulusPlus-${{ github.ref_name }}-windows-standalone.zip" -Force
          Copy-Item -Path "JamulusPlus/build-ci-windows/installer-output/*.exe" -Destination "release-assets/" -Force

      - name: Publish Release Assets
        if: startsWith(github.ref, 'refs/tags/V') || startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release-assets/JamulusPlus-${{ github.ref_name }}-windows-clap.zip
            release-assets/JamulusPlus-${{ github.ref_name }}-windows-vst3.zip
            release-assets/JamulusPlus-${{ github.ref_name }}-windows-standalone.zip
            release-assets/JamulusPlus-Setup-${{ github.ref_name }}.exe

  build-macos:
    name: macOS CLAP + VST3 + AU + Standalone
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Checkout JamulusPlus submodules
        run: |
          git submodule update --init --depth 1 --recursive -- JamulusPlus/third_party/JUCE JamulusPlus/third_party/clap-juce-extensions

      - name: Configure
        run: >
          cmake -S JamulusPlus -B JamulusPlus/build-ci-macos -G Xcode
          -DENABLE_AU=ON
          -DENABLE_CLAP=ON
          -DENABLE_STANDALONE=ON
          -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGNING_ALLOWED=NO
          -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGNING_REQUIRED=NO
          -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGN_STYLE=Manual
          -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGN_IDENTITY=
          -DCMAKE_XCODE_ATTRIBUTE_DEVELOPMENT_TEAM=
          -DCMAKE_XCODE_ATTRIBUTE_ENABLE_HARDENED_RUNTIME=NO

      - name: Build CLAP
        run: >
          cmake --build JamulusPlus/build-ci-macos --config Release
          --target jamulus_engine_CLAP
          --verbose
          --
          CODE_SIGNING_ALLOWED=NO
          CODE_SIGNING_REQUIRED=NO
          CODE_SIGN_STYLE=Manual
          CODE_SIGN_IDENTITY=
          DEVELOPMENT_TEAM=

      - name: Build VST3
        run: >
          cmake --build JamulusPlus/build-ci-macos --config Release
          --target jamulus_engine_VST3
          --verbose
          --
          CODE_SIGNING_ALLOWED=NO
          CODE_SIGNING_REQUIRED=NO
          CODE_SIGN_STYLE=Manual
          CODE_SIGN_IDENTITY=
          DEVELOPMENT_TEAM=

      - name: Build AU
        run: >
          cmake --build JamulusPlus/build-ci-macos --config Release
          --target jamulus_engine_AU
          --verbose
          --
          CODE_SIGNING_ALLOWED=NO
          CODE_SIGNING_REQUIRED=NO
          CODE_SIGN_STYLE=Manual
          CODE_SIGN_IDENTITY=
          DEVELOPMENT_TEAM=

      - name: Build Standalone
        run: >
          cmake --build JamulusPlus/build-ci-macos --config Release
          --target jamulus_engine_Standalone
          --verbose
          --
          CODE_SIGNING_ALLOWED=NO
          CODE_SIGNING_REQUIRED=NO
          CODE_SIGN_STYLE=Manual
          CODE_SIGN_IDENTITY=
          DEVELOPMENT_TEAM=

      - name: Upload CLAP
        uses: actions/upload-artifact@v4
        with:
          name: JamulusPlus-macos-clap
          if-no-files-found: error
          path: JamulusPlus/build-ci-macos/plugin/jamulus_engine_artefacts/Release/CLAP/JamulusPlus.clap

      - name: Upload VST3
        uses: actions/upload-artifact@v4
        with:
          name: JamulusPlus-macos-vst3
          if-no-files-found: error
          path: JamulusPlus/build-ci-macos/plugin/jamulus_engine_artefacts/Release/VST3/JamulusPlus.vst3

      - name: Upload AU
        uses: actions/upload-artifact@v4
        with:
          name: JamulusPlus-macos-au
          if-no-files-found: error
          path: JamulusPlus/build-ci-macos/plugin/jamulus_engine_artefacts/Release/AU/JamulusPlus.component

      - name: Upload Standalone
        uses: actions/upload-artifact@v4
        with:
          name: JamulusPlus-macos-standalone
          if-no-files-found: error
          path: |
            JamulusPlus/build-ci-macos/plugin/jamulus_engine_artefacts/Release/Standalone/JamulusPlus.app
            JamulusPlus/dist/JamulusPlus.app

      - name: Package Release Assets
        if: startsWith(github.ref, 'refs/tags/V') || startsWith(github.ref, 'refs/tags/v')
        run: |
          mkdir -p release-assets
          ditto -c -k --sequesterRsrc --keepParent "JamulusPlus/build-ci-macos/plugin/jamulus_engine_artefacts/Release/CLAP/JamulusPlus.clap" "release-assets/JamulusPlus-${{ github.ref_name }}-macos-clap.zip"
          ditto -c -k --sequesterRsrc --keepParent "JamulusPlus/build-ci-macos/plugin/jamulus_engine_artefacts/Release/VST3/JamulusPlus.vst3" "release-assets/JamulusPlus-${{ github.ref_name }}-macos-vst3.zip"
          ditto -c -k --sequesterRsrc --keepParent "JamulusPlus/build-ci-macos/plugin/jamulus_engine_artefacts/Release/AU/JamulusPlus.component" "release-assets/JamulusPlus-${{ github.ref_name }}-macos-au.zip"
          if [ -d "JamulusPlus/dist/JamulusPlus.app" ]; then
            ditto -c -k --sequesterRsrc --keepParent "JamulusPlus/dist/JamulusPlus.app" "release-assets/JamulusPlus-${{ github.ref_name }}-macos-standalone.zip"
          else
            ditto -c -k --sequesterRsrc --keepParent "JamulusPlus/build-ci-macos/plugin/jamulus_engine_artefacts/Release/Standalone/JamulusPlus.app" "release-assets/JamulusPlus-${{ github.ref_name }}-macos-standalone.zip"
          fi

      - name: Publish Release Assets
        if: startsWith(github.ref, 'refs/tags/V') || startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release-assets/JamulusPlus-${{ github.ref_name }}-macos-clap.zip
            release-assets/JamulusPlus-${{ github.ref_name }}-macos-vst3.zip
            release-assets/JamulusPlus-${{ github.ref_name }}-macos-au.zip
            release-assets/JamulusPlus-${{ github.ref_name }}-macos-standalone.zip
